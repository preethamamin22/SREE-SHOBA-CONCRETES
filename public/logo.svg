<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <!-- White background -->
  <rect width="400" height="420" fill="transparent"/>

  <!-- Trefoil knot symbol - three interlocking rings -->
  <!-- This recreates the SHOBA logo trefoil: three ovals rotated 120deg apart, overlapping at center -->
  
  <g transform="translate(200, 165)">
    <!-- Ring 1: Top oval (0 degrees) -->
    <ellipse cx="0" cy="-52" rx="34" ry="58" 
             fill="none" stroke="#1E5AC8" stroke-width="28"
             transform="rotate(0)"/>
    <!-- Ring 2: Bottom-right oval (120 degrees) -->
    <ellipse cx="0" cy="-52" rx="34" ry="58" 
             fill="none" stroke="#1E5AC8" stroke-width="28"
             transform="rotate(120)"/>
    <!-- Ring 3: Bottom-left oval (240 degrees) -->
    <ellipse cx="0" cy="-52" rx="34" ry="58" 
             fill="none" stroke="#1E5AC8" stroke-width="28"
             transform="rotate(240)"/>
  </g>

  <!-- SHOBA text -->
  <text x="200" y="310" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="78" 
        font-weight="bold" 
        fill="#CC1818" 
        text-anchor="middle"
        letter-spacing="3">SHOBA</text>

  <!-- Tagline -->
  <text x="200" y="360" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="22" 
        font-weight="600"
        fill="#1a1a1a" 
        text-anchor="middle"
        letter-spacing="0.5">Name of Trusted Quality</text>
</svg>
